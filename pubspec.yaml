name: miniwiki
description: "Privacy-first personal wiki — 100% offline, E2E encrypted"
publish_to: 'none'
version: 0.2.0

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  markdown_widget: ^2.3.0
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0
  go_router: ^14.0.0

  # Storage
  drift: ^2.22.0
  sqlite3: ^2.7.0
  sqlite3_flutter_libs: ^0.5.0

  # Security
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.0

  # Sync (Phase 2)
  # nsd: ^2.0.0

  # Utility
  uuid: ^4.5.0
  intl: ^0.20.2
  path_provider: ^2.1.0
  path: ^1.9.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0
  markdown: ^7.1.0
  archive: ^3.4.0
  share_plus: ^7.2.0

  # Editor (WebView-based for CJK IME support)
  flutter_inappwebview: ^6.0.0

  # Icons / Theme
  cupertino_icons: ^1.0.8
  crypto: ^3.0.7
  ffi: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  drift_dev: ^2.22.0
  riverpod_generator: ^2.6.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/editor/
